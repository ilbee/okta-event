name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  php-cs-fixer:
    name: PHP CS Fixer (${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.4']
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - uses: ramsey/composer-install@v3

      - run: vendor/bin/php-cs-fixer check ./src --diff --verbose --allow-risky=yes

  phpstan:
    name: PHPStan (PHP ${{ matrix.php }}${{ matrix.composer-flags && ' --prefer-lowest' || '' }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.4'
            composer-flags: '--prefer-lowest'
          - php: '8.4'
            composer-flags: ''
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - uses: ramsey/composer-install@v3
        with:
          composer-options: ${{ matrix.composer-flags }}

      - run: vendor/bin/phpstan analyse --memory-limit=-1

  phpunit:
    name: PHPUnit (PHP ${{ matrix.php }} / Symfony ${{ matrix.symfony }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.4']
        symfony: ['^6.4', '^7.0', '^7.1', '^7.2', '^7.3', '^7.4']
    env:
      SYMFONY_VERSION: ${{ matrix.symfony }}
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: pcov

      - uses: ramsey/composer-install@v3

      - name: Require matching Symfony version
        run: composer update "symfony/*:${SYMFONY_VERSION}" --with-all-dependencies --no-interaction --prefer-dist

      - run: vendor/bin/phpunit --coverage-text
